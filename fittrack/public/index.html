<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#00ff88" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitTrack" />
    <meta name="application-name" content="FitTrack" />
    <meta name="msapplication-TileColor" content="#00ff88" />

    <!-- SEO -->
    <meta name="description" content="FitTrack — Your personal gym companion. Track workouts, nutrition, water intake and progress." />
    <meta name="keywords" content="gym, workout, fitness, tracker, nutrition, India" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Icons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

    <!-- Fonts preload -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>FitTrack — Gym Workout Tracker</title>

    <style>
      /* Splash screen while app loads */
      body {
        margin: 0;
        padding: 0;
        background-color: #0a0a0f;
        font-family: Impact, sans-serif;
      }

      #splash {
        position: fixed;
        inset: 0;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      #splash h1 {
        color: #00ff88;
        font-size: 48px;
        letter-spacing: 6px;
        margin: 0 0 12px 0;
      }

      #splash p {
        color: #5a5a78;
        font-family: Arial, sans-serif;
        font-size: 14px;
        margin: 0 0 30px 0;
      }

      #splash .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #1e1e2e;
        border-top-color: #00ff88;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>

    <!-- Splash Screen -->
    <div id="splash">
      <h1>FITTRACK</h1>
      <p>Your Gym Companion 💪</p>
      <div class="spinner"></div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- Remove splash once React loads -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            splash.style.transition = 'opacity 0.5s ease';
            setTimeout(function() {
              splash.style.display = 'none';
            }, 500);
          }
        }, 800);
      });

      // Register Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('FitTrack SW registered:', reg.scope);
            })
            .catch(function(err) {
              console.log('SW registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
